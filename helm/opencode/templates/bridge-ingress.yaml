{{- if and .Values.bridge.enabled .Values.bridge.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "opencode.bridge.fullname" . }}
  labels:
    {{- include "opencode.bridge.labels" . | nindent 4 }}
    {{- with .Values.globalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.bridge.ingress.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.globalAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.bridge.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.bridge.ingress.className }}
  ingressClassName: {{ .Values.bridge.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.bridge.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "opencode.bridge.fullname" $ }}
                port:
                  number: {{ $.Values.bridge.service.port }}
          {{- end }}
    {{- end }}
  {{- with .Values.bridge.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}